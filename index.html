<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi | Beautiful Colors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="watercolor-bg"></div>

    <div id="magic-container"></div>

    <main class="hero-section">
        <div class="elegant-glass-card" id="mainCard">
            <div class="card-glow"></div>
            
            <h2 class="pre-title">Wishing a very Happy Holi to...</h2>
            <h1 class="title"><span id="typing-name"></span><span class="sparkle" id="sparkle"></span></h1>
            
            <div class="content-wrapper">
                <p class="intro-text">May your world always be painted with the softest, sweetest, and most beautiful colors. 🌸</p>
                
                <button id="revealBtn" class="cute-glow-btn">
                    <span>Click the Magic Button ✨</span>
                </button>

                <div id="secretMessage" class="hidden-message">
                    <p class="sweet-text">May your life always have the perfect rhythm and the most joyous moments. 💃🎨</p>
                    <p class="cheer-line">Keep smiling, always!</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
